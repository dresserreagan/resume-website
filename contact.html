        <!-- Page Header -->
        <header class="masthead" style="background-image: url('contact-bg.jpg')">
            <div class="container position-relative px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7">
                        <div class="page-heading">
                            <h1>Contact Me</h1>
                            <span class="subheading">Let's connect — I'd love to hear from you.</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>
        <!-- Main Content -->
        <main class="mb-4">
            <div class="container px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7">
                        <p>Want to get in touch? Reach out directly or fill out the form below.</p>
                        <div class="mb-4 d-flex flex-wrap gap-2">
                            <a href="mailto:dresserreagan@gmail.com" class="btn btn-primary"><i class="fas fa-envelope me-2"></i>dresserreagan@gmail.com</a>
                            <a href="tel:4802165296" class="btn btn-outline-secondary"><i class="fas fa-phone me-2"></i>(480) 216-5296</a>
                            <a href="https://www.linkedin.com/in/reagan-h-dresser-5ab462387/" target="_blank" class="btn btn-outline-secondary"><i class="fab fa-linkedin me-2"></i>LinkedIn</a>
                        </div>
                        <div class="my-4">
                            <form id="contactForm">
                                <div class="form-floating mb-3">
                                    <input class="form-control" id="name" type="text" placeholder="Enter your name..." required />
                                    <label for="name">Name</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input class="form-control" id="email" type="email" placeholder="Enter your email..." required />
                                    <label for="email">Email address</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input class="form-control" id="phone" type="tel" placeholder="Enter your phone number..." />
                                    <label for="phone">Phone Number</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <textarea class="form-control" id="message" placeholder="Enter your message here..." style="height: 12rem" required></textarea>
                                    <label for="message">Message</label>
                                </div>
                                <button class="btn btn-primary" type="submit">Send</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <!-- Footer -->
        <footer class="border-top">
            <div class="container px-4 px-lg-5">
